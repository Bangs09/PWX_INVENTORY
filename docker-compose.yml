version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pwx-inventory
    volumes:
      - ./Database:/app/Database
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    networks:
      - pwx-network

  caddy:
    image: caddy:latest
    container_name: pwx-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    networks:
      - pwx-network

  cloudflare-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: pwx-tunnel
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    restart: unless-stopped
    networks:
      - pwx-network

networks:
  pwx-network:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
